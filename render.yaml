# Render Blueprint — NeXmiL Tournament (monorepo: backend serves ../frontend)
services:
  - type: web
    name: nexmill-tournament
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: MONGO_URI
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: ADMIN_SEED_EMAIL
        sync: false
      - key: ADMIN_SEED_PASSWORD
        sync: false
      - key: ENABLE_DEBUG_ROUTES
        value: "false"
      - key: REFERRAL_COINS
        value: "100"
      - key: COIN_RATE
        value: "0.2"
